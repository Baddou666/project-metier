server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 10s
    batchsize: 1024

scrape_configs:
  - job_name: rate-limiter
    static_configs:
      - targets:
          - localhost
        labels:
          job: rate-limiter
          __path__: /logs/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            thread: thread
            app: app
            version: version
            environment: environment
            service: service
            event_type: context.event_type
            source_ip: context.source_ip
            user_id: context.user_id
            status: context.status
            route_id: context.route_id
            counter_value: context.counter_value
            rate_limit: context.rate_limit
            limit_reached: context.limit_reached
            redis_key: context.redis_key
            detail: context.detail
            exception_message: context.exception_message
            attempts: context.attempts
            token_count: context.token_count

      - labels:
          service:
          event_type:
          status:
          level:
          route_id:
          app:

  - job_name: token-manager
    static_configs:
      - targets:
          - localhost
        labels:
          job: token-manager
          __path__: /token-manager-logs/*.log

    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            thread: thread
            app: app
            version: version
            environment: environment
            service: service
            event_type: context.event_type
            source_ip: context.source_ip
            user_id: context.user_id
            status: context.status
            counter_value: context.counter_value
            rate_limit: context.rate_limit
            limit_reached: context.limit_reached
            redis_key: context.redis_key
            detail: context.detail
            exception_message: context.exception_message
            malformed_ip: context.malformed_ip
            token_count: context.token_count

      - labels:
          service:
          event_type:
          status:
          level:
          app:
