server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 10s
    batchsize: 1024

scrape_configs:
  - job_name: rate-limiter
    static_configs:
      - targets:
          - localhost
        labels:
          job: rate-limiter
          app: rate-limiter
          service: api-gateway
          __path__: /logs/rate-limiter.log

    # Multi-stage pipeline pour parser et enrichir les logs JSON
    pipeline_stages:
      # Stage 1: Parser JSON
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            thread: thread
            app: app
            version: version
            environment: environment
            service: service
            event_type: event_type
            source_ip: source_ip
            user_id: user_id
            status: status
            counter_value: counter_value
            rate_limit: rate_limit
            limit_reached: limit_reached
            redis_key: redis_key
            detail: detail
            exception_message: exception_message
            attempts: attempts
            token_count: token_count

      # Stage 2: Extraire les labels pour Loki
      - labels:
          event_type:
          status:
          source_ip:
          level:
          user_id:
          app:

      # Stage 3: Formater le message pour plus de lisibilité
      - output:
          source: message

  # Configuration optionnelle pour les logs Docker
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: container_name
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: log_stream

    pipeline_stages:
      - json:
          expressions:
            app: app
            level: level
            message: message
      - labels:
          app:
          level:
