server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: ${PROMTAIL_LOG_LEVEL}

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: ${LOKI_PUSH_URL}
    batchwait: 5s
    batchsize: 1048576

scrape_configs:
  - job_name: rate-limiter
    static_configs:
      - targets:
          - localhost
        labels:
          job: rate-limiter
          __path__: /logs/rate-limiting/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            app: app
            version: version
            environment: environment
            service: service
            event_type: context.event_type
            status: context.status
            route_id: context.route_id
            limit_reached: context.limit_reached

      - drop:
          source: logger
          expression: 'org\.springframework\.cloud\.gateway\..*'

      - labels:
          level:
          logger:
          app:
          environment:
          service:
          event_type:
          status:
          route_id:
          limit_reached:

  - job_name: token-manager
    static_configs:
      - targets:
          - localhost
        labels:
          job: token-manager
          __path__: /logs/token-manager/*.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            app: app
            version: version
            environment: environment
            service: service
            event_type: context.event_type
            status: context.status
            limit_reached: context.limit_reached

      - labels:
          level:
          logger:
          app:
          environment:
          service:
          event_type:
          status:
          limit_reached:
