global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'rate-limiter-monitor'

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Spring Boot Actuator metrics (optionnel)
  - job_name: 'rate-limiter'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['rate-limiter:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__scheme__]
        target_label: scheme

  # Scrape Loki (optionnel)
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Scrape Grafana (optionnel)
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
