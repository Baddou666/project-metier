services:
  # Loki - Agrégateur de logs
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - monitoring
    environment:
      LOKI_CONFIG: /etc/loki/local-config.yml

  # Promtail - Agent de collecte de logs
  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - ../rate-limiting-service/logs:/logs:ro
      - ../token-manager/logs:/token-manager-logs:ro
      - ../promtail-service/promtail-config.yml:/etc/promtail/config.yml
      - promtail-positions:/var/lib/promtail
    ports:
      - "9080:9080"
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring

  # Prometheus (optionnel) pour les métriques
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../promtail-service/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - monitoring

networks:
  monitoring:
    name: monitoring-network
    driver: bridge

volumes:
  loki-data:
  prometheus-data:
  promtail-positions:
