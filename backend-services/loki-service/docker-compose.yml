services:
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    expose:
      - 3100
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yml
    restart: unless-stopped

volumes:
  loki-data:
