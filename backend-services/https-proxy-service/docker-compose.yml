services:
  https-proxy:
    image: nginx:alpine
    container_name: https-proxy
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Définissez vos variables ici (ou via un fichier .env)
      - FIRST_HTTP_ENDPOINT_HOST=${FIRST_HTTP_ENDPOINT_HOST}
      - FIRST_HTTP_ENDPOINT_PORT=${FIRST_HTTP_ENDPOINT_PORT}
    volumes:
      # CHANGEMENT ICI : On monte dans /etc/nginx/templates/
      # Et on ajoute l'extension .template au fichier source
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - dmz-network

networks:
  dmz-network:
    external: true