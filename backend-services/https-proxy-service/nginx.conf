# Configuration du résolveur Docker pour éviter que Nginx ne plante si l'app est éteinte
resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name localhost; # À remplacer par ton domaine en prod

    # Redirection automatique vers HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    # Chemins vers les certificats (montés via volumes Docker)
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Paramètres de sécurité SSL de base
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        # Utilisation d'une variable pour le nom du service
        # Cela permet à Nginx de démarrer même si le conteneur 'app-ratelimiter' n'est pas lancé
        
        proxy_pass http://${PROXY_TARGET_HOST}:${PROXY_TARGET_PORT};

        # --- HEADERS CRUCIAUX POUR TON ANTI-SPAM (Signature par IP) ---
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts pour éviter de bloquer des connexions trop longtemps
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}