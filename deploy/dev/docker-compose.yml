include:
  - path: ../../backend-services/https-proxy-service/docker-compose.yml
  - path: ../../backend-services/frontend-service/docker-compose.yml
  - path: ../../backend-services/rate-limiting-service/docker-compose.yml
  - path: ../../backend-services/redis-shared-memory-service/docker-compose.yml
  - path: ../../backend-services/token-manager/docker-compose.yml
  - path: ../../backend-services/postgre-db-service/docker-compose.yml
  - path: ../../backend-services/model-handler-service/docker-compose.yml
  - path: ../../backend-services/transformer-model-service/docker-compose.yml
  - path: ../../backend-services/loki-service/docker-compose.yml
  - path: ../../backend-services/promtail-service/docker-compose.yml
  - path: ../../backend-services/grafana-service/docker-compose.yml

services:
  https-proxy:
    networks:
      - proxy-ratelimiter-net
      - proxy-fe-net
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    depends_on:
      - ai-text-detector-frontend
      - rate-limiting-service

  ai-text-detector-frontend:
    networks:
      - proxy-fe-net

  rate-limiting-service:
    networks:
      - proxy-ratelimiter-net
      - redis-net
      - api-model-net
    depends_on:
      - redis-server

  token-manager-service:
    networks:
      - redis-net
    depends_on:
      - redis-server

  redis-server:
    container_name: ${REDIS_HOST}
    networks:
      - redis-net

  postgres-service:
    networks:
      - postgres-net

  model-handler-service:
    networks:
      - models-net
      - postgres-net
      - api-model-net
    depends_on:
      - postgres-service
      - transformer-model-service

  transformer-model-service:
    networks:
      - models-net

  loki:
    networks:
      - monitoring

  promtail:
    networks:
      - monitoring
    depends_on:
      - loki

  grafana:
    networks:
      - monitoring
    depends_on:
      - loki

networks:
  proxy-ratelimiter-net:
    driver: bridge
    name: proxy-ratelimiter-net
  redis-net:
    driver: bridge
    name: redis-net
  proxy-fe-net:
    driver: bridge
    name: proxy-fe-net
  postgres-net:
    driver: bridge
  models-net:
    driver: bridge
  api-model-net:
    driver: bridge
  monitoring:
    name: monitoring-network
    driver: bridge
