include:
  - path: ./services/https-proxy-service/docker-compose.yml
  - path: ./services/frontend-service/docker-compose.yml
  - path: ./services/rate-limiting-service/docker-compose.yml
  - path: ./services/redis-shared-memory-service/docker-compose.yml
  - path: ./services/token-manager/docker-compose.yml
  - path: ./services/postgre-db-service/docker-compose.yml
  - path: ./services/model-handler-service/docker-compose.yml
  - path: ./services/transformer-model-service/docker-compose.yml
  - path: ./services/loki-service/docker-compose.yml
  - path: ./services/promtail-service/docker-compose.yml
  - path: ./services/grafana-service/docker-compose.yml

services:
  https-proxy:
    networks:
      - proxy-ratelimiter-net
      - proxy-fe-net
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == backend
      restart_policy:
        condition: any

  ai-text-detector-frontend:
    networks:
      - proxy-fe-net
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == backend
      restart_policy:
        condition: any

  rate-limiting-service:
    networks:
      - proxy-ratelimiter-net
      - redis-net
      - api-model-net
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.labels.role == backend
      restart_policy:
        condition: any

  token-manager-service:
    networks:
      - redis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == backend
      restart_policy:
        condition: any

  redis-server:
    networks:
      - redis-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == backend
      restart_policy:
        condition: any

  postgres-service:
    networks:
      - postgres-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == ai
      restart_policy:
        condition: any

  model-handler-service:
    networks:
      - models-net
      - postgres-net
      - api-model-net
    deploy:
      replicas: 2
      placement:
        constraints:
          - node.labels.role == ai
      restart_policy:
        condition: any

  transformer-model-service:
    networks:
      - models-net
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.labels.role == ai
      restart_policy:
        condition: any

  loki:
    networks:
      - monitoring
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == monitoring
      restart_policy:
        condition: any

  promtail:
    networks:
      - monitoring
    deploy:
      mode: global
      placement:
        constraints:
          - node.labels.role == backend
      restart_policy:
        condition: any

  grafana:
    networks:
      - monitoring
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == monitoring
      restart_policy:
        condition: any

networks:
  proxy-ratelimiter-net:
    driver: overlay
    ipam:
      config:
        - subnet: 10.42.10.0/24

  redis-net:
    driver: overlay
    ipam:
      config:
        - subnet: 10.42.11.0/24

  proxy-fe-net:
    driver: overlay
    ipam:
      config:
        - subnet: 10.42.12.0/24

  postgres-net:
    driver: overlay
    ipam:
      config:
        - subnet: 10.42.13.0/24

  models-net:
    driver: overlay
    ipam:
      config:
        - subnet: 10.42.14.0/24

  api-model-net:
    driver: overlay
    ipam:
      config:
        - subnet: 10.42.15.0/24

  monitoring:
    driver: overlay
    ipam:
      config:
        - subnet: 10.42.16.0/24
