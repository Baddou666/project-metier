spring.application.name=rate-limiter
spring.main.web-application-type=reactive
spring.config.import=optional:classpath:config/ratelimiting.properties,optional:classpath:config/server.properties,optional:classpath:config/routes.properties,optional:file:./config/ratelimiting.properties,optional:file:./config/server.properties,optional:file:./config/routes.properties,optional:file:/workspace/config/ratelimiting.properties,optional:file:/workspace/config/server.properties,optional:file:/workspace/config/routes.properties,optional:file:.env[.properties]
api-gateway-service.data.redis.redis-host=${REDIS_HOST}
api-gateway-service.data.redis.redis-port=${REDIS_PORT}
api-gateway-service.data.redis.redis-password=${REDIS_PASSWORD}
api-gateway-service.security.auth-sevice.url=${JWKS_SRC_URL}
api-gateway-service.security.authentication.gateway-shared-secret-header=${AUTH_GATEWAY_SHARED_SECRET_HEADER}
api-gateway-service.security.authentication.gateway-shared-secret=${AUTH_GATEWAY_SHARED_SECRET}
api-gateway-service.network.real-ip-header=${REAL_IP_HEADER}
api-gateway-service.network.forwarded-client-ip-header=${FORWARDED_CLIENT_IP_HEADER}
api-gateway-service.network.trusted-forwarded-headers=${TRUSTED_FORWARDED_HEADERS}

api-gateway-service.network.is-anonymous-user-header=${IS_ANONYM_USER_HEADER}

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.gateway.route.RouteDefinitionRouteLocator=TRACE
logging.level.org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping=TRACE
logging.level.org.springframework.boot.context.config=DEBUG
