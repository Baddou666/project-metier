spring.application.name=DataService
server.port=8080
spring.datasource.url=jdbc:postgresql://${POSTGRES_URL}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.security=DEBUG
ai-detector.detector-api.url=${MODEL_URL}

security.jwt.secret-key =${JWT_SECRET_KEY}
ai-detector.network.is-anonymous-user-header=${IS_ANONYM_USER_HEADER}