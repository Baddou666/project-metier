spring.application.name=DataService
server.port=8082
spring.datasource.url=jdbc:postgresql://ep-curly-tooth-alnbcbpd-pooler.c-3.eu-central-1.aws.neon.tech/PredictionDatabase?sslmode=require&channelBinding=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.springframework.security=DEBUG
model.api.url=http://localhost:8000

security.jwt.secret-key =${JWT_SECRET_KEY}
spring.config.import=optional:file:.env[.properties]
