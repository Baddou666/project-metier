spring.application.name=api-gateway


api-gateway-service.security.jwt.secret-key=${JWT_SECRET_KEY}
api-gateway-service.security.jwt.expirationSec=3600
api-gateway-service.security.jwt.minJwtSecretLength=32

api-gateway-service.security.hash.algorithme="HmacSHA256"
api-gateway-service.security.hash.salt=${HASH_SALT}

api-gateway-service.data.redis.redisHost=${REDIS-HOST}

