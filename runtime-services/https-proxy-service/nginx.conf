# Configuration du resolveur Docker pour les upstreams resolus a la requete.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name localhost; # A remplacer par ton domaine en prod.

    # Redirection automatique vers HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    # Chemins vers les certificats montes via volumes Docker.
    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    # Parametres de securite SSL de base.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location /api/ {
        set $api_upstream ${PROXY_API_HOST}:${PROXY_API_PORT};
        proxy_pass http://$api_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers requis pour conserver l'IP client cote API.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "http://localhost:3000" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        set $frontend_upstream ${PROXY_FE_HOST}:${PROXY_FE_PORT};
        proxy_pass http://$frontend_upstream;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
