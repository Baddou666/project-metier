---
- name: Prepare Docker Swarm staging nodes
  hosts: swarm_nodes
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        timeout: 180

    - name: Ensure Python is installed for Ansible modules
      raw: test -e /usr/bin/python3 || (apt-get update && apt-get install -y python3)
      changed_when: false

    - name: Gather facts
      setup:

  tasks:
    - name: Update apt repository cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - git
          - git-lfs
          - gnupg
          - lsb-release
          - openssl
          - python3
          - rsync
        state: present

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: "{{ ansible_user | default('ubuntu') }}"
        groups: docker
        append: true

    - name: Allow Docker Swarm firewall ports with ufw when present
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
      loop:
        - { port: "2377", proto: "tcp" }
        - { port: "7946", proto: "tcp" }
        - { port: "7946", proto: "udp" }
        - { port: "4789", proto: "udp" }
      when: ansible_facts.packages.ufw is defined

- name: Initialize Docker Swarm manager
  hosts: swarm_managers
  become: true
  gather_facts: true

  tasks:
    - name: Read current Docker Swarm state
      command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}"
      register: swarm_state
      changed_when: false

    - name: Select manager advertise address
      set_fact:
        swarm_advertise_addr: "{{ ansible_default_ipv4.address }}"

    - name: Initialize Docker Swarm
      command:
        argv:
          - docker
          - swarm
          - init
          - --advertise-addr
          - "{{ swarm_advertise_addr }}"
      when: swarm_state.stdout != "active"

    - name: Get Docker Swarm worker join token
      command:
        argv:
          - docker
          - swarm
          - join-token
          - -q
          - worker
      register: worker_join_token
      changed_when: false

    - name: Store worker join command facts
      set_fact:
        swarm_manager_addr: "{{ swarm_advertise_addr }}"
        swarm_worker_join_token: "{{ worker_join_token.stdout }}"

- name: Join Docker Swarm workers
  hosts: swarm_workers
  become: true
  gather_facts: true

  tasks:
    - name: Read current Docker Swarm state
      command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}"
      register: swarm_state
      changed_when: false

    - name: Join worker to Docker Swarm
      command:
        argv:
          - docker
          - swarm
          - join
          - --token
          - "{{ hostvars[groups['swarm_managers'][0]].swarm_worker_join_token }}"
          - "{{ hostvars[groups['swarm_managers'][0]].swarm_manager_addr }}:2377"
      when: swarm_state.stdout != "active"

- name: Label Docker Swarm nodes
  hosts: swarm_managers
  become: true
  gather_facts: false

  tasks:
    - name: Wait until all expected nodes are visible
      command:
        argv:
          - docker
          - node
          - ls
          - --format
          - "{{ '{{' }}.Hostname{{ '}}' }}"
      register: swarm_node_names
      changed_when: false
      retries: 20
      delay: 3
      until: swarm_node_names.stdout_lines | length >= groups['swarm_nodes'] | length

    - name: Apply role labels to Swarm nodes
      command:
        argv:
          - docker
          - node
          - update
          - --label-add
          - "role={{ hostvars[item].node_label }}"
          - "{{ hostvars[item].ansible_hostname }}"
      loop: "{{ groups['swarm_nodes'] }}"
      changed_when: true

- name: Prepare staging deployment files per node
  hosts: swarm_nodes
  become: true
  gather_facts: false
  vars:
    staging_checkout_paths_by_role:
      manager:
        - deploy/staging/docker-compose.yml
        - deploy/staging/.env.example
        - deploy/staging/services/https-proxy-service/**
        - deploy/staging/services/frontend-service/**
        - deploy/staging/services/rate-limiting-service/**
        - deploy/staging/services/redis-shared-memory-service/**
        - deploy/staging/services/token-manager/**
        - deploy/staging/services/postgre-db-service/**
        - deploy/staging/services/model-handler-service/**
        - deploy/staging/services/transformer-model-service/**
        - deploy/staging/services/loki-service/**
        - deploy/staging/services/promtail-service/**
        - deploy/staging/services/grafana-service/**
      backend:
        - deploy/staging/services/https-proxy-service/**
        - deploy/staging/services/frontend-service/**
        - deploy/staging/services/rate-limiting-service/**
        - deploy/staging/services/redis-shared-memory-service/**
        - deploy/staging/services/token-manager/**
        - deploy/staging/services/promtail-service/**
      ai:
        - deploy/staging/services/postgre-db-service/**
        - deploy/staging/services/model-handler-service/**
        - deploy/staging/services/transformer-model-service/**
      monitoring:
        - deploy/staging/services/loki-service/**
        - deploy/staging/services/grafana-service/**
    staging_runtime_dirs_by_role:
      backend:
        - services/https-proxy-service/certs
        - services/rate-limiting-service/logs
        - services/token-manager/certs
        - services/token-manager/logs
      ai:
        - services/transformer-model-service/model
      monitoring: []
      manager: []
    staging_images_by_role:
      backend:
        - nginx:alpine
        - ghcr.io/baddou666/projet-metier/staging/ai-text-detector-frontend:v1.0.0
        - ghcr.io/baddou666/projet-metier/staging/rate-limiter:v1.0.0
        - ghcr.io/baddou666/projet-metier/staging/token-manager:v1.0.0
        - redis:7-alpine
        - grafana/promtail:2.9.0
      ai:
        - postgres:16
        - ghcr.io/baddou666/projet-metier/staging/model-handler:v1.0.0
        - ghcr.io/baddou666/projet-metier/staging/transformer-model:v1.0.0
      monitoring:
        - grafana/loki:2.9.0
        - grafana/grafana:latest
      manager: []

  tasks:
    - name: Stop when stack deployment is disabled
      meta: end_play
      when: not (deploy_stack | default(false) | bool)

    - name: Resolve staging checkout paths for this node
      set_fact:
        staging_node_role: "{{ node_label | default('manager') }}"
        staging_node_checkout_paths: "{{ staging_checkout_paths_by_role[node_label | default('manager')] | default([]) }}"
        staging_node_runtime_dirs: "{{ staging_runtime_dirs_by_role[node_label | default('manager')] | default([]) }}"
        staging_node_images: "{{ staging_images_by_role[node_label | default('manager')] | default([]) }}"

    - name: Stop when node role has no staging checkout mapping
      fail:
        msg: "No staging checkout mapping found for node role {{ staging_node_role }}"
      when: staging_node_checkout_paths | length == 0

    - name: Create staging project parent directory
      file:
        path: "{{ project_parent_dir | default('/opt/projet-metier-staging') }}"
        state: directory
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0755'

    - name: Initialize sparse staging repository
      command:
        argv:
          - git
          - init
          - "{{ project_repo_dir | default('/opt/projet-metier-staging/project-metier') }}"
        creates: "{{ project_repo_dir | default('/opt/projet-metier-staging/project-metier') }}/.git"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Configure sparse checkout remote and mode
      shell: |
        set -euo pipefail
        if git remote get-url origin >/dev/null 2>&1; then
          git remote set-url origin "{{ project_repo_url | default('https://github.com/Baddou666/project-metier.git') }}"
        else
          git remote add origin "{{ project_repo_url | default('https://github.com/Baddou666/project-metier.git') }}"
        fi
        git config core.sparseCheckout true
        git config core.sparseCheckoutCone false
        git config remote.origin.promisor true
        git config remote.origin.partialclonefilter blob:none
      args:
        chdir: "{{ project_repo_dir | default('/opt/projet-metier-staging/project-metier') }}"
        executable: /bin/bash
      become_user: "{{ ansible_user | default('ubuntu') }}"
      changed_when: false

    - name: Write role-specific sparse checkout paths
      copy:
        dest: "{{ project_repo_dir | default('/opt/projet-metier-staging/project-metier') }}/.git/info/sparse-checkout"
        content: "{{ staging_node_checkout_paths | join('\n') }}\n"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0644'

    - name: Fetch and checkout staging-only files
      shell: |
        set -euo pipefail
        git fetch --depth 1 --filter=blob:none origin "{{ project_repo_version | default('main') }}"
        git checkout -f FETCH_HEAD
      args:
        chdir: "{{ project_repo_dir | default('/opt/projet-metier-staging/project-metier') }}"
        executable: /bin/bash
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Create runtime directories required on this node
      file:
        path: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/{{ item }}"
        state: directory
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0755'
      loop: "{{ staging_node_runtime_dirs }}"

    - name: Ensure backend service log directories are writable
      file:
        path: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - services/token-manager/logs
        - services/rate-limiting-service/logs
      when: staging_node_role == "backend"

    - name: Find token manager scripts on backend nodes
      find:
        paths: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/services/token-manager"
        patterns: "*.sh"
        file_type: file
      register: token_manager_scripts
      when: staging_node_role == "backend"

    - name: Find HTTPS proxy service scripts on backend nodes
      find:
        paths: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/services/https-proxy-service"
        patterns: "*.sh"
        file_type: file
      register: https_proxy_service_scripts
      when: staging_node_role == "backend"

    - name: Run token manager scripts on backend nodes
      command:
        argv:
          - sh
          - "{{ item.path }}"
      args:
        chdir: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/services/token-manager"
      loop: "{{ token_manager_scripts.files | default([]) | sort(attribute='path') }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"
      when: staging_node_role == "backend"

    - name: Run HTTPS proxy service scripts on backend nodes
      command:
        argv:
          - sh
          - "{{ item.path }}"
      args:
        chdir: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/services/https-proxy-service"
      loop: "{{ https_proxy_service_scripts.files | default([]) | sort(attribute='path') }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"
      when: staging_node_role == "backend"

    - name: Configure Git LFS on AI nodes
      command:
        argv:
          - git
          - lfs
          - install
          - --skip-repo
      become_user: "{{ ansible_user | default('ubuntu') }}"
      changed_when: false
      when: staging_node_role == "ai"

    - name: Initialize Hugging Face model checkout on AI nodes
      command:
        argv:
          - git
          - init
          - "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/services/transformer-model-service/model"
        creates: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/services/transformer-model-service/model/.git"
      become_user: "{{ ansible_user | default('ubuntu') }}"
      when: staging_node_role == "ai"

    - name: Download Hugging Face model files on AI nodes
      shell: |
        set -euo pipefail
        if git remote get-url origin >/dev/null 2>&1; then
          git remote set-url origin "{{ hf_model_repo_url | default('https://huggingface.co/Mitsuman/distilbert') }}"
        else
          git remote add origin "{{ hf_model_repo_url | default('https://huggingface.co/Mitsuman/distilbert') }}"
        fi
        git fetch --depth 1 origin "{{ hf_model_repo_version | default('main') }}"
        git -c advice.detachedHead=false checkout -f FETCH_HEAD
        git lfs pull
      args:
        chdir: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/services/transformer-model-service/model"
        executable: /bin/bash
      become_user: "{{ ansible_user | default('ubuntu') }}"
      when: staging_node_role == "ai"

    - name: Load staging vault variables for image pulls
      include_vars:
        file: vault.yml
      no_log: true

    - name: Authenticate Docker to GHCR on staging nodes
      command: docker login "{{ ghcr_registry | default('ghcr.io') }}" --username "{{ ghcr_username | default('baddou666') }}" --password-stdin
      args:
        stdin: "{{ vault_ghcr_api_key }}"
      register: node_ghcr_login_result
      changed_when: false
      failed_when: node_ghcr_login_result.rc != 0
      no_log: true
      when: staging_node_images | select('search', '^ghcr\\.io/') | list | length > 0

    - name: Pull Docker images required on this node
      command:
        argv:
          - docker
          - pull
          - "{{ item }}"
      loop: "{{ staging_node_images }}"

- name: Optional staging stack deployment
  hosts: swarm_managers
  become: true
  gather_facts: false

  tasks:
    - name: Stop when stack deployment is disabled
      meta: end_play
      when: not (deploy_stack | default(false) | bool)

    - name: Load staging vault variables
      include_vars:
        file: vault.yml
      no_log: true

    - name: Stop when required staging vault variables are missing
      assert:
        that:
          - vars.get(item, '') is not none
          - vars.get(item, '') | string | trim | length > 0
        fail_msg: "Missing or empty required vault variable: {{ item }}"
      loop:
        - vault_ghcr_api_key
        - vault_redis_password
        - vault_auth_gateway_shared_secret
        - vault_postgresdb_password
        - vault_jwt_secret_key
        - vault_grafana_admin_password

    - name: Authenticate Docker to GHCR for Swarm deployment
      command: docker login "{{ ghcr_registry | default('ghcr.io') }}" --username "{{ ghcr_username | default('baddou666') }}" --password-stdin
      args:
        stdin: "{{ vault_ghcr_api_key }}"
      register: ghcr_login_result
      changed_when: false
      failed_when: ghcr_login_result.rc != 0
      no_log: true

    - name: Stop when GHCR authentication failed
      fail:
        msg: "Docker login to {{ ghcr_registry | default('ghcr.io') }} failed. Check vault_ghcr_api_key, ghcr_username, and GHCR package permissions."
      when: ghcr_login_result is failed

    - name: Render staging environment file
      template:
        src: templates/deploy.staging.env.j2
        dest: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/{{ staging_env_file | default('.env') }}"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0600'
      no_log: true
      when: render_staging_env | default(true) | bool

    - name: Check staging environment file exists
      stat:
        path: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/{{ staging_env_file | default('.env') }}"
      register: staging_env_file_stat

    - name: Stop when staging environment file is missing
      fail:
        msg: "Missing staging env file: {{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}/{{ staging_env_file | default('.env') }}"
      when: not staging_env_file_stat.stat.exists

    - name: Render staging Docker Compose stack
      shell: |
        set -euo pipefail
        umask 077
        docker compose --env-file "{{ staging_env_file | default('.env') }}" -f docker-compose.yml config \
          | sed -E '/^name: /d; s/published: "([0-9]+)"/published: \1/' \
          > "{{ staging_rendered_stack_file | default('/tmp/ai-detector-staging-compose.yml') }}"
      args:
        chdir: "{{ staging_deploy_dir | default('/opt/projet-metier-staging/project-metier/deploy/staging') }}"
        executable: /bin/bash
      changed_when: false
      no_log: true

    - name: Deploy staging Docker stack
      command:
        argv:
          - docker
          - stack
          - deploy
          - -c
          - "{{ staging_rendered_stack_file | default('/tmp/ai-detector-staging-compose.yml') }}"
          - --with-registry-auth
          - "{{ stack_name | default('ai-detector-staging') }}"
