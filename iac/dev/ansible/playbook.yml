---
- name: Configure development deployment VM with Docker and Git
  hosts: dev_vms
  become: true
  gather_facts: false

  vars_files:
    - vault.yml

  vars:
    deployment_environment: development
    ghcr_registry: ghcr.io
    ghcr_username: baddou666
    docker_users:
      - "{{ ansible_user | default('ubuntu') }}"
    dev_project_parent_dir: "/home/{{ ansible_user | default('ubuntu') }}/projet-metier-dev"
    project_repo_url: "https://github.com/Baddou666/project-metier.git"
    project_repo_dir: "{{ dev_project_parent_dir }}/project-metier"
    dev_deploy_dir: "{{ project_repo_dir }}/deploy/dev"
    hf_model_repo_url: "https://huggingface.co/Mitsuman/distilbert"
    hf_model_clone_dir: "{{ dev_project_parent_dir }}/distilbert"
    hf_model_target_dirs:
      - "{{ project_repo_dir }}/backend-services/transformer-model-service/model"

  pre_tasks:
    - name: Wait for SSH to become available
      wait_for_connection:
        timeout: 120

    - name: Ensure Python is installed for Ansible modules
      raw: test -e /usr/bin/python3 || (apt-get update && apt-get install -y python3)
      changed_when: false

    - name: Gather facts
      setup:

  tasks:
    - name: Update apt repository cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - git
          - git-lfs
          - gnupg
          - lsb-release
          - openssl
          - python3
          - rsync
        state: present

    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker apt repository
      apt_repository:
        repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: true

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
    - name: Force reset connection to apply group changes
      meta: reset_connection

    - name: Authenticate Docker to GHCR
      command: docker login "{{ ghcr_registry }}" --username "{{ ghcr_username }}" --password-stdin
      args:
        stdin: "{{ vault_ghcr_api_key }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"
      changed_when: false
      no_log: true

    - name: Create development project directory
      file:
        path: "{{ dev_project_parent_dir }}"
        state: directory
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0755'

    - name: Check development repository directory
      stat:
        path: "{{ project_repo_dir }}"
      register: project_repo_dir_stat

    - name: Clone project repository for development deployment without checkout
      command:
        argv:
          - git
          - clone
          - --filter=blob:none
          - --sparse
          - --no-checkout
          - "{{ project_repo_url }}"
          - "{{ project_repo_dir }}"
      when: not project_repo_dir_stat.stat.exists
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Check existing development repository git metadata
      stat:
        path: "{{ project_repo_dir }}/.git"
      register: project_repo_git_dir

    - name: Fail when development repository directory is not a Git clone
      fail:
        msg: "{{ project_repo_dir }} exists but is not a Git repository. Move it or remove it before deployment."
      when: not project_repo_git_dir.stat.exists

    - name: Fetch development repository updates
      command:
        argv:
          - git
          - fetch
          - --prune
          - origin
          - main
        chdir: "{{ project_repo_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Enable development sparse checkout
      command:
        argv:
          - git
          - sparse-checkout
          - init
          - --no-cone
        chdir: "{{ project_repo_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Configure development sparse checkout exclusions
      copy:
        dest: "{{ project_repo_dir }}/.git/info/sparse-checkout"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0644'
        content: |
          /*
          !/iac/
          !/services-src-code/
          !/extention/

    - name: Discard local tracked changes before checkout
      command:
        argv:
          - git
          - reset
          - --hard
        chdir: "{{ project_repo_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Remove untracked files before checkout
      command:
        argv:
          - git
          - clean
          - -fdx
        chdir: "{{ project_repo_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Checkout development repository main branch
      command:
        argv:
          - git
          - -c
          - advice.detachedHead=false
          - checkout
          - --force
          - -B
          - main
          - origin/main
        chdir: "{{ project_repo_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Force development repository to origin main
      command:
        argv:
          - git
          - reset
          - --hard
          - origin/main
        chdir: "{{ project_repo_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Remove untracked files from development repository
      command:
        argv:
          - git
          - clean
          - -fdx
        chdir: "{{ project_repo_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Render development environment file
      template:
        src: templates/deploy.dev.env.j2
        dest: "{{ project_repo_dir }}/deploy/dev/.env"
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0600'
      no_log: true

    - name: Ensure service log directories are writable
      file:
        path: "{{ project_repo_dir }}/{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - backend-services/token-manager/logs
        - backend-services/rate-limiting-service/logs

    - name: Find token manager scripts
      find:
        paths: "{{ project_repo_dir }}/backend-services/token-manager"
        patterns: "*.sh"
        file_type: file
      register: token_manager_scripts

    - name: Find HTTPS proxy service scripts
      find:
        paths: "{{ project_repo_dir }}/backend-services/https-proxy-service"
        patterns: "*.sh"
        file_type: file
      register: https_proxy_service_scripts

    - name: Run token manager scripts
      command:
        argv:
          - sh
          - "{{ item.path }}"
        chdir: "{{ project_repo_dir }}/backend-services/token-manager"
      loop: "{{ token_manager_scripts.files | sort(attribute='path') }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Run HTTPS proxy service scripts
      command:
        argv:
          - sh
          - "{{ item.path }}"
        chdir: "{{ project_repo_dir }}/backend-services/https-proxy-service"
      loop: "{{ https_proxy_service_scripts.files | sort(attribute='path') }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Configure Git LFS for deployment user
      command:
        argv:
          - git
          - lfs
          - install
          - --skip-repo
      become_user: "{{ ansible_user | default('ubuntu') }}"
      changed_when: false

    - name: Clone Hugging Face model repository
      git:
        repo: "{{ hf_model_repo_url }}"
        dest: "{{ hf_model_clone_dir }}"
        version: main
        update: true
        force: true
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Download Hugging Face Git LFS model files
      command:
        argv:
          - git
          - lfs
          - pull
        chdir: "{{ hf_model_clone_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Ensure model target directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_user | default('ubuntu') }}"
        group: "{{ ansible_user | default('ubuntu') }}"
        mode: '0755'
      loop: "{{ hf_model_target_dirs }}"

    - name: Synchronize downloaded model into project directories
      command:
        argv:
          - rsync
          - -a
          - --delete
          - --exclude=.git
          - "{{ hf_model_clone_dir }}/"
          - "{{ item }}/"
      loop: "{{ hf_model_target_dirs }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Pull development Docker images
      command:
        argv:
          - docker
          - compose
          - pull
        chdir: "{{ dev_deploy_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"

    - name: Start development Docker Compose stack
      command:
        argv:
          - docker
          - compose
          - up
          - -d
        chdir: "{{ dev_deploy_dir }}"
      become_user: "{{ ansible_user | default('ubuntu') }}"


